<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Andrianus Mendrofa - Catatan Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* ==================== BACKGROUND 2 SISI ==================== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            overflow: hidden;
            display: flex;
        }

        .bg-left {
            position: relative;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }
        .bg-left .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('walpa1.jpg') no-repeat center center;
            background-size: cover;
            animation: bgZoom 5s ease-in-out infinite alternate;
            filter: brightness(1.15) contrast(1.05);
        }

        .bg-right {
            position: relative;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }
        .bg-right .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('walpa1.jpg') no-repeat center center;
            background-size: cover;
            animation: bgZoom 5s ease-in-out infinite alternate-reverse;
            filter: brightness(1.15) contrast(1.05);
        }

        @keyframes bgZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .dynamic-gradient-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, 
                rgba(255, 215, 180, 0.15) 0%, 
                rgba(200, 180, 220, 0.1) 50%,
                rgba(255, 215, 180, 0.08) 100%);
            animation: gradientShift 12s ease-in-out infinite;
            z-index: 1;
        }

        .dynamic-gradient-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(235deg, 
                rgba(220, 200, 240, 0.15) 0%, 
                rgba(180, 160, 200, 0.1) 50%,
                rgba(220, 200, 240, 0.08) 100%);
            animation: gradientShift 12s ease-in-out infinite reverse;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.6; transform: scale(1.03) rotate(0.5deg); }
            100% { opacity: 0.3; transform: scale(1) rotate(0deg); }
        }

        .bg-overlay-left, .bg-overlay-right {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(249, 181, 62, 0.5), transparent);
            z-index: 3;
            transform: translateX(-50%);
        }

        /* ==================== EFEK HUJAN ==================== */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            background: linear-gradient(180deg, rgba(180, 220, 255, 0.6), rgba(150, 190, 255, 0.2));
            width: 2px;
            height: 15px;
            border-radius: 2px;
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-20px) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) translateX(15px);
                opacity: 0;
            }
        }

        /* Efek percikan air di tanah */
        .rain-splash {
            position: absolute;
            background: radial-gradient(circle, rgba(180, 220, 255, 0.4), transparent);
            border-radius: 50%;
            width: 8px;
            height: 8px;
            animation: rainSplash 0.5s ease-out forwards;
        }

        @keyframes rainSplash {
            0% {
                transform: scale(0.5);
                opacity: 0.6;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* ==================== EFEK PETIR ==================== */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .lightning-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 245, 200, 0.9), rgba(255, 220, 100, 0.3), transparent);
            opacity: 0;
            animation: lightningBolt 6s ease-in-out infinite;
        }

        .lightning-flash-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(200, 220, 255, 0.8), rgba(150, 180, 255, 0.25), transparent);
            opacity: 0;
            animation: lightningBolt2 8s ease-in-out infinite;
        }

        .lightning-bolt {
            position: absolute;
            background: linear-gradient(180deg, rgba(255, 245, 180, 0.9), rgba(255, 200, 80, 0.4));
            width: 3px;
            height: 150px;
            border-radius: 2px;
            filter: blur(2px);
            opacity: 0;
            animation: lightningStrike 7s ease-in-out infinite;
        }

        .lightning-bolt:nth-child(1) { left: 15%; top: 0; transform: rotate(12deg); animation-delay: 0s; }
        .lightning-bolt:nth-child(2) { left: 45%; top: 0; transform: rotate(-8deg); animation-delay: 2s; }
        .lightning-bolt:nth-child(3) { left: 70%; top: 0; transform: rotate(18deg); animation-delay: 4s; }
        .lightning-bolt:nth-child(4) { left: 88%; top: 0; transform: rotate(-6deg); animation-delay: 6s; }
        .lightning-bolt:nth-child(5) { left: 30%; top: 0; transform: rotate(6deg); animation-delay: 3s; }

        @keyframes lightningBolt {
            0%, 96%, 100% { opacity: 0; }
            97% { opacity: 0.8; }
            98% { opacity: 0.15; }
            99% { opacity: 0.6; }
        }
        @keyframes lightningBolt2 {
            0%, 94%, 100% { opacity: 0; }
            95% { opacity: 0.65; }
            96% { opacity: 0.1; }
            97% { opacity: 0.45; }
        }
        @keyframes lightningStrike {
            0%, 96%, 100% { opacity: 0; height: 0; }
            97% { opacity: 0.85; height: 180px; }
            98% { opacity: 0.15; height: 130px; }
            99% { opacity: 0.55; height: 160px; }
        }

        /* ==================== EFEK GRIMS (KABUT) & ANGIN ==================== */
        .wind-fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .fog-layer {
            position: absolute;
            top: -20%;
            left: -30%;
            width: 160%;
            height: 140%;
            background: radial-gradient(ellipse at center, rgba(210, 190, 170, 0.2) 0%, rgba(180, 160, 150, 0.08) 40%, transparent 70%);
            animation: fogMove 18s ease-in-out infinite;
            filter: blur(20px);
        }

        .fog-layer-2 {
            position: absolute;
            top: -30%;
            left: -10%;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at 60% 40%, rgba(190, 175, 160, 0.15) 0%, rgba(160, 145, 135, 0.06) 50%, transparent 85%);
            animation: fogMove2 22s ease-in-out infinite reverse;
            filter: blur(25px);
        }

        .fog-layer-3 {
            position: absolute;
            top: -10%;
            left: -50%;
            width: 180%;
            height: 130%;
            background: radial-gradient(ellipse at 30% 70%, rgba(200, 185, 170, 0.12) 0%, rgba(170, 155, 145, 0.05) 60%, transparent 90%);
            animation: fogMove3 25s ease-in-out infinite;
            filter: blur(30px);
        }

        @keyframes fogMove {
            0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateX(12%) translateY(6%) rotate(2deg); opacity: 0.9; }
            100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.5; }
        }
        @keyframes fogMove2 {
            0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.4; }
            50% { transform: translateX(-8%) translateY(5%) rotate(-3deg); opacity: 0.8; }
            100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.4; }
        }
        @keyframes fogMove3 {
            0% { transform: translateX(0) translateY(0) scale(1); opacity: 0.35; }
            50% { transform: translateX(6%) translateY(-4%) scale(1.05); opacity: 0.7; }
            100% { transform: translateX(0) translateY(0) scale(1); opacity: 0.35; }
        }

        .wind-streak {
            position: absolute;
            background: linear-gradient(90deg, rgba(255, 235, 200, 0.25), rgba(255, 220, 160, 0.08), transparent);
            height: 2px;
            width: 180px;
            border-radius: 2px;
            filter: blur(1px);
            animation: windBlow 7s linear infinite;
        }

        @keyframes windBlow {
            0% { transform: translateX(-250px) translateY(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateX(100vw) translateY(25px); opacity: 0; }
        }

        .wind-streak:nth-child(1) { top: 15%; animation-delay: 0s; width: 140px; }
        .wind-streak:nth-child(2) { top: 35%; animation-delay: 1.8s; width: 200px; }
        .wind-streak:nth-child(3) { top: 50%; animation-delay: 0.9s; width: 120px; }
        .wind-streak:nth-child(4) { top: 70%; animation-delay: 3.5s; width: 220px; }
        .wind-streak:nth-child(5) { top: 85%; animation-delay: 5s; width: 160px; }
        .wind-streak:nth-child(6) { top: 25%; animation-delay: 2.2s; width: 180px; }
        .wind-streak:nth-child(7) { top: 60%; animation-delay: 6s; width: 130px; }
        .wind-streak:nth-child(8) { top: 10%; animation-delay: 4.5s; width: 150px; }
        .wind-streak:nth-child(9) { top: 42%; animation-delay: 7.2s; width: 170px; }
        .wind-streak:nth-child(10) { top: 78%; animation-delay: 3s; width: 190px; }

        /* Partikel debu */
        .glow-dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .dust {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 225, 150, 0.5), rgba(255, 200, 100, 0.15));
            border-radius: 50%;
            filter: blur(2px);
            animation: dustFloat 12s ease-in-out infinite;
        }
        @keyframes dustFloat {
            0% { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh) translateX(60px) scale(1.2); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 240, 180, 0.8), rgba(255, 220, 120, 0.25));
            border-radius: 50%;
            width: 3px;
            height: 3px;
            filter: blur(1px);
            animation: sparkleTwinkle 3s ease-in-out infinite;
        }
        @keyframes sparkleTwinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.7; transform: scale(1.3); box-shadow: 0 0 6px rgba(255, 215, 0, 0.5); }
        }

        /* ==================== STICKY HEADER - TRANSPARAN ==================== */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: transparent;
            backdrop-filter: none;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(249, 181, 62, 0.2);
        }

        .ppslot-container {
            max-width: 1400px;
            margin: 0 auto;
            background: transparent;
            position: relative;
            z-index: 1;
            padding: 0 1.5rem 2rem 1.5rem;
        }

        .brand {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #F9B53E, #FFD966, #FFB347, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            display: block;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 20px rgba(249, 181, 62, 0.4);
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(249, 181, 62, 0.2); }
            100% { text-shadow: 0 0 30px rgba(249, 181, 62, 0.6); }
        }

        .control-panel-row {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 0.7rem 1.2rem;
            margin-bottom: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            border: 1px solid rgba(249, 181, 62, 0.25);
        }

        .left-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .grid-control {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(249, 181, 62, 0.3);
        }

        .grid-control label {
            color: #FFD966;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .grid-select {
            background: rgba(10, 12, 18, 0.8);
            border: 1px solid #F9B53E;
            color: #FFE0A3;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .add-card-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 181, 62, 0.4);
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .add-card-btn:hover {
            background: #F9B53E;
            color: #0a0c12;
            transform: scale(1.02);
            border-color: #F9B53E;
        }

        .search-wrapper {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            border: 1px solid rgba(249, 181, 62, 0.4);
            display: flex;
            align-items: center;
            padding: 0.35rem 1rem;
            min-width: 250px;
            flex: 1;
            max-width: 320px;
        }
        .search-wrapper span {
            color: #F9B53E;
            margin-right: 6px;
            font-size: 0.8rem;
        }
        .search-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: #f0f3fc;
            font-size: 0.8rem;
        }
        .search-wrapper input::placeholder {
            color: rgba(200, 208, 232, 0.7);
            font-size: 0.75rem;
        }

        .right-group {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .edit-mode-toggle {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 181, 62, 0.4);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        .edit-mode-toggle.active {
            background: #F9B53E;
            color: #0a0c12;
            box-shadow: 0 0 6px #F9B53E;
            border-color: #F9B53E;
        }

        .add-menu-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 181, 62, 0.4);
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .add-menu-btn:hover {
            background: #F9B53E;
            color: #0a0c12;
            transform: scale(1.02);
            border-color: #F9B53E;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        .filter-chip {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #ccd6f0;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(249, 181, 62, 0.3);
            user-select: none;
        }

        .filter-chip.active, .filter-chip:hover {
            background: #F9B53E;
            color: #0a0c12;
            border-color: #F9B53E;
            transform: translateY(-1px);
        }

        .edit-mode .filter-chip {
            outline: 1px dashed #F9B53E;
            cursor: text;
        }

        .delete-chip {
            background: none;
            border: none;
            margin-left: 6px;
            color: #ff8888;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .main-content {
            padding-top: 0.5rem;
        }

        .menu-section {
            margin-bottom: 1.5rem;
        }
        .menu-section-header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 14px;
            margin-bottom: 0.8rem;
            border-left: 4px solid #F9B53E;
            font-weight: 700;
            color: #FFDE9E;
            font-size: 0.9rem;
        }

        .games-grid {
            display: grid;
            gap: 1.2rem;
            transition: all 0.2s;
        }

        .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-cols-5 { grid-template-columns: repeat(5, 1fr); }

        .game-card {
            background: rgba(30, 30, 40, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(249, 181, 62, 0.35);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #F9B53E;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: rgba(40, 40, 55, 0.8);
        }

        .card-title {
            background: rgba(20, 20, 30, 0.7);
            padding: 0.5rem 0.6rem;
            border-bottom: 1px solid rgba(249, 181, 62, 0.3);
            text-align: center;
        }
        .card-title-input {
            width: 100%;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(249, 181, 62, 0.5);
            border-radius: 8px;
            color: #FFDE9E;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.35rem 0.5rem;
            font-family: inherit;
            text-align: center;
        }
        .card-title-input:focus {
            outline: none;
            border-color: #F9B53E;
            background: rgba(30, 30, 45, 0.9);
            color: #FFFFFF;
        }
        .card-title-input::placeholder {
            color: rgba(255, 222, 158, 0.5);
        }

        .note-area {
            background: transparent;
            padding: 0.8rem;
        }
        .note-textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(20, 20, 30, 0.55);
            border: 1px solid rgba(249, 181, 62, 0.35);
            border-radius: 12px;
            color: #F0F3FC;
            font-size: 0.75rem;
            line-height: 1.55;
            padding: 0.7rem;
            resize: vertical;
            font-family: inherit;
            font-weight: 500;
        }
        .note-textarea:focus {
            outline: none;
            border-color: #F9B53E;
            background: rgba(30, 30, 45, 0.75);
            color: #FFFFFF;
        }
        .note-textarea::placeholder {
            color: rgba(200, 208, 232, 0.5);
            font-weight: 400;
        }

        .delete-card-btn {
            background: rgba(170, 46, 78, 0.8);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            font-size: 0.65rem;
            border-radius: 30px;
            padding: 5px;
            margin: 0 0.7rem 0.7rem 0.7rem;
            cursor: pointer;
            width: calc(100% - 1.4rem);
            display: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .delete-card-btn:hover {
            background: #aa2e4e;
            transform: scale(1.02);
        }
        .edit-mode .delete-card-btn {
            display: block;
        }

        .save-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #F9B53E;
            color: #0a0c12;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .save-toast.show {
            opacity: 1;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 900px) {
            .control-panel-row { flex-direction: column; align-items: stretch; }
            .left-group { justify-content: space-between; }
            .search-wrapper { max-width: 100%; }
            .right-group { justify-content: flex-start; }
            .sticky-header { padding: 0.6rem 1rem; }
            .ppslot-container { padding: 0 1rem 1.5rem 1rem; }
            .brand { font-size: 1.6rem; }
        }

        @media (max-width: 600px) {
            .left-group { flex-direction: column; align-items: stretch; }
            .grid-control { justify-content: space-between; }
            .note-textarea { min-height: 110px; }
            .brand { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <!-- BACKGROUND 2 SISI -->
    <div class="bg-container">
        <div class="bg-left">
            <div class="bg-image"></div>
            <div class="dynamic-gradient-left"></div>
            <div class="bg-overlay-left"></div>
        </div>
        <div class="bg-right">
            <div class="bg-image"></div>
            <div class="dynamic-gradient-right"></div>
            <div class="bg-overlay-right"></div>
        </div>
        <div class="divider-line"></div>
    </div>

    <!-- EFEK HUJAN -->
    <div class="rain" id="rainContainer"></div>

    <!-- EFEK PETIR -->
    <div class="lightning">
        <div class="lightning-flash"></div>
        <div class="lightning-flash-2"></div>
        <div class="lightning-bolt"></div>
        <div class="lightning-bolt"></div>
        <div class="lightning-bolt"></div>
        <div class="lightning-bolt"></div>
        <div class="lightning-bolt"></div>
    </div>

    <!-- EFEK GRIMS & ANGIN -->
    <div class="wind-fog">
        <div class="fog-layer"></div>
        <div class="fog-layer-2"></div>
        <div class="fog-layer-3"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
        <div class="wind-streak"></div>
    </div>

    <!-- PARTIKEL -->
    <div class="glow-dust" id="glowDust"></div>
    <div class="sparkles" id="sparkles"></div>

    <!-- KONTEN UTAMA -->
    <div class="sticky-header">
        <div class="ppslot-container" style="padding: 0; margin: 0 auto;">
            <div class="brand">ANDRIANUS MENDROFA</div>

            <div class="control-panel-row">
                <div class="left-group">
                    <div class="grid-control">
                        <label>📐 Grid:</label>
                        <select id="gridSelect" class="grid-select">
                            <option value="1">1 Kolom</option>
                            <option value="2">2 Kolom</option>
                            <option value="3" selected>3 Kolom</option>
                            <option value="4">4 Kolom</option>
                            <option value="5">5 Kolom</option>
                        </select>
                    </div>
                    <button id="addCardBtn" class="add-card-btn">📝 + Kartu Baru</button>
                </div>

                <div class="search-wrapper">
                    <span>🔎</span>
                    <input type="text" id="searchInput" placeholder="Cari judul kartu...">
                </div>

                <div class="right-group">
                    <button id="editModeBtn" class="edit-mode-toggle">✏️ Mode Edit (MATI)</button>
                    <button id="addMenuBtn" class="add-menu-btn">➕ Tambah Menu</button>
                </div>
            </div>

            <div class="filter-bar" id="filterBar"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="ppslot-container">
            <div id="searchResultsContainer"></div>
            <div id="normalViewContainer">
                <div class="games-grid" id="gamesGrid"></div>
            </div>
        </div>
    </div>

    <div id="saveToast" class="save-toast">💾 Tersimpan otomatis</div>

    <script>
        // ==================== EFEK HUJAN ====================
        function createRain() {
            const rainContainer = document.getElementById('rainContainer');
            const dropCount = 150;
            
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                const size = Math.random() * 2 + 1;
                const height = Math.random() * 15 + 8;
                drop.style.width = size + 'px';
                drop.style.height = height + 'px';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = Math.random() * 1.5 + 0.8 + 's';
                drop.style.animationDelay = Math.random() * 5 + 's';
                drop.style.opacity = Math.random() * 0.6 + 0.3;
                rainContainer.appendChild(drop);
            }
        }
        
        createRain();

        // ==================== PARTIKEL DINAMIS ====================
        function createGlowDust() {
            const container = document.getElementById('glowDust');
            const count = 70;
            for (let i = 0; i < count; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust';
                const size = Math.random() * 7 + 2;
                dust.style.width = size + 'px';
                dust.style.height = size + 'px';
                dust.style.left = Math.random() * 100 + '%';
                dust.style.animationDuration = Math.random() * 15 + 8 + 's';
                dust.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(dust);
            }
        }

        function createSparkles() {
            const container = document.getElementById('sparkles');
            const count = 120;
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDuration = Math.random() * 4 + 1.5 + 's';
                sparkle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(sparkle);
            }
        }

        createGlowDust();
        createSparkles();

        // ==================== STORAGE KEYS ====================
        const STORAGE_KEYS = {
            MENU_DATA: 'ppslot_menu_data_v4',
            FILTER_MENU_LIST: 'ppslot_filter_menu_list',
            ACTIVE_MENU: 'ppslot_active_menu'
        };

        // ==================== DATA DEFAULT ====================
        const defaultFilterMenuList = [
            { label: 'Semua', value: 'all', active: true },
            { label: 'Top', value: 'top', active: false },
            { label: 'Beli Bonus', value: 'beli-bonus', active: false },
            { label: 'Baru', value: 'baru', active: false },
            { label: 'Reel Kingdom', value: 'reel-kingdom', active: false },
            { label: 'Megaways', value: 'megaways', active: false },
            { label: 'Klasik', value: 'klasik', active: false }
        ];

        const defaultMenuData = {
            cards: [
                { title: "", note: "RTP: 96.5%\nVolatility: Tinggi\nMax Win: 5000x\nFitur: Free Spin, Multiplier" },
                { title: "", note: "RTP: 96.5%\nVolatility: Sedang\nFitur: Bonus beli spin" },
                { title: "", note: "RTP: 96.5%\nVolatility: Extreme\nMax Win: 100000X\nFitur: Cluster Pays" },
                { title: "", note: "RTP: 96.2%\nVolatility: Tinggi\nFitur: Respin, Jackpot Progresif" }
            ],
            gridCols: '3'
        };

        // ==================== GLOBAL STATE ====================
        let filterMenuList = [];
        let activeMenuValue = 'all';
        let menuDataMap = {};
        let editMode = false;
        let isSearching = false;
        let currentSearchTerm = '';

        // ==================== DOM Elements ====================
        const filterBar = document.getElementById('filterBar');
        const searchInput = document.getElementById('searchInput');
        const gridSelect = document.getElementById('gridSelect');
        const editModeBtn = document.getElementById('editModeBtn');
        const addMenuBtn = document.getElementById('addMenuBtn');
        const addCardBtn = document.getElementById('addCardBtn');
        const searchResultsContainer = document.getElementById('searchResultsContainer');
        const normalViewContainer = document.getElementById('normalViewContainer');
        const gamesGrid = document.getElementById('gamesGrid');

        // ==================== LOAD / SAVE FUNCTIONS ====================
        function showSaveToast() {
            const toast = document.getElementById('saveToast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function saveAllData() {
            localStorage.setItem(STORAGE_KEYS.FILTER_MENU_LIST, JSON.stringify(filterMenuList));
            localStorage.setItem(STORAGE_KEYS.MENU_DATA, JSON.stringify(menuDataMap));
            localStorage.setItem(STORAGE_KEYS.ACTIVE_MENU, activeMenuValue);
            showSaveToast();
        }

        function loadAllData() {
            const savedMenuList = localStorage.getItem(STORAGE_KEYS.FILTER_MENU_LIST);
            if (savedMenuList) {
                filterMenuList = JSON.parse(savedMenuList);
            } else {
                filterMenuList = JSON.parse(JSON.stringify(defaultFilterMenuList));
            }

            const savedMenuData = localStorage.getItem(STORAGE_KEYS.MENU_DATA);
            if (savedMenuData) {
                menuDataMap = JSON.parse(savedMenuData);
            } else {
                menuDataMap = {};
            }

            const savedActiveMenu = localStorage.getItem(STORAGE_KEYS.ACTIVE_MENU);
            if (savedActiveMenu) {
                activeMenuValue = savedActiveMenu;
                const menuExists = filterMenuList.some(m => m.value === activeMenuValue);
                if (!menuExists) activeMenuValue = 'all';
            } else {
                activeMenuValue = 'all';
            }

            filterMenuList.forEach(menu => {
                menu.active = (menu.value === activeMenuValue);
            });

            for (const menu of filterMenuList) {
                if (!menuDataMap[menu.value]) {
                    menuDataMap[menu.value] = JSON.parse(JSON.stringify(defaultMenuData));
                }
            }
        }

        function getCurrentMenuData() {
            if (!menuDataMap[activeMenuValue]) {
                menuDataMap[activeMenuValue] = JSON.parse(JSON.stringify(defaultMenuData));
            }
            return menuDataMap[activeMenuValue];
        }

        function saveCurrentMenuData() {
            saveAllData();
        }

        // ==================== RENDER KARTU ====================
        function renderCardsForMenu(container, cards, menuGridCols = null) {
            if (!container) return;
            container.innerHTML = '';
            
            if (!cards || cards.length === 0) {
                container.innerHTML = '<div style="color:#aaa; text-align:center; padding:2rem;">Tidak ada kartu di menu ini</div>';
                return;
            }
            
            const cols = menuGridCols || getCurrentMenuData().gridCols || '3';
            container.className = `games-grid grid-cols-${cols}`;
            
            cards.forEach((card, idx) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'game-card';
                cardDiv.setAttribute('data-title', (card.title || '').toLowerCase());
                cardDiv.setAttribute('data-note', (card.note || '').toLowerCase());
                
                const titleArea = document.createElement('div');
                titleArea.className = 'card-title';
                const titleInput = document.createElement('input');
                titleInput.type = 'text';
                titleInput.className = 'card-title-input';
                titleInput.value = card.title || '';
                titleInput.placeholder = 'Judul kartu (kosong)';
                titleInput.addEventListener('input', (e) => {
                    card.title = e.target.value;
                    cardDiv.setAttribute('data-title', (card.title || '').toLowerCase());
                    if (!isSearching) {
                        saveCurrentMenuData();
                    } else {
                        saveAllData();
                        performGlobalSearch(currentSearchTerm);
                    }
                });
                titleArea.appendChild(titleInput);
                
                const noteArea = document.createElement('div');
                noteArea.className = 'note-area';
                const textarea = document.createElement('textarea');
                textarea.className = 'note-textarea';
                textarea.value = card.note || '';
                textarea.placeholder = '✏️ Tulis catatan di sini...\n\nContoh:\n• RTP: \n• Volatility: \n• Max Win: \n• Fitur: \n• Tips:';
                textarea.addEventListener('input', (e) => {
                    card.note = e.target.value;
                    cardDiv.setAttribute('data-note', (card.note || '').toLowerCase());
                    if (!isSearching) {
                        saveCurrentMenuData();
                    } else {
                        saveAllData();
                        performGlobalSearch(currentSearchTerm);
                    }
                });
                noteArea.appendChild(textarea);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-card-btn';
                delBtn.innerText = '🗑 Hapus Kartu';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    cards.splice(idx, 1);
                    if (!isSearching) {
                        renderCardsForMenu(gamesGrid, cards);
                        saveCurrentMenuData();
                    } else {
                        saveAllData();
                        performGlobalSearch(currentSearchTerm);
                    }
                });
                
                cardDiv.appendChild(titleArea);
                cardDiv.appendChild(noteArea);
                cardDiv.appendChild(delBtn);
                container.appendChild(cardDiv);
            });
            
            if (editMode) {
                document.querySelectorAll('.card-title-input').forEach(input => {
                    input.style.borderColor = '#FFB347';
                    input.style.background = 'rgba(30, 30, 45, 0.9)';
                });
                document.querySelectorAll('.note-textarea').forEach(ta => {
                    ta.style.borderColor = '#FFB347';
                    ta.style.background = 'rgba(30, 30, 45, 0.8)';
                });
                document.querySelectorAll('.delete-card-btn').forEach(btn => {
                    btn.style.display = 'block';
                });
            } else {
                document.querySelectorAll('.card-title-input').forEach(input => {
                    input.style.borderColor = 'rgba(249, 181, 62, 0.5)';
                    input.style.background = 'rgba(15, 15, 25, 0.8)';
                });
                document.querySelectorAll('.note-textarea').forEach(ta => {
                    ta.style.borderColor = 'rgba(249, 181, 62, 0.35)';
                    ta.style.background = 'rgba(20, 20, 30, 0.55)';
                });
                document.querySelectorAll('.delete-card-btn').forEach(btn => {
                    btn.style.display = 'none';
                });
            }
        }

        // ==================== PENCARIAN GLOBAL ====================
        function performGlobalSearch(searchTerm) {
            currentSearchTerm = searchTerm;
            
            if (!searchTerm || searchTerm.trim() === '') {
                isSearching = false;
                searchResultsContainer.innerHTML = '';
                normalViewContainer.style.display = 'block';
                const menuData = getCurrentMenuData();
                gridSelect.value = menuData.gridCols || '3';
                renderCardsForMenu(gamesGrid, menuData.cards || []);
                return;
            }
            
            isSearching = true;
            normalViewContainer.style.display = 'none';
            searchResultsContainer.innerHTML = '';
            
            const lowerSearchTerm = searchTerm.toLowerCase().trim();
            const results = [];
            
            for (const menu of filterMenuList) {
                const menuValue = menu.value;
                const menuData = menuDataMap[menuValue];
                if (menuData && menuData.cards) {
                    const matchedCards = [];
                    for (const card of menuData.cards) {
                        const titleMatch = (card.title || '').toLowerCase().includes(lowerSearchTerm);
                        const noteMatch = (card.note || '').toLowerCase().includes(lowerSearchTerm);
                        if (titleMatch || noteMatch) {
                            matchedCards.push({ ...card, originalMenu: menuValue, menuLabel: menu.label });
                        }
                    }
                    if (matchedCards.length > 0) {
                        results.push({
                            menuValue: menuValue,
                            menuLabel: menu.label,
                            cards: matchedCards,
                            gridCols: menuData.gridCols || '3'
                        });
                    }
                }
            }
            
            if (results.length === 0) {
                searchResultsContainer.innerHTML = `<div style="text-align:center; padding:3rem; color:#aaa;">🔍 Tidak ada kartu dengan judul "${searchTerm}"</div>`;
                return;
            }
            
            for (const result of results) {
                const menuSection = document.createElement('div');
                menuSection.className = 'menu-section';
                
                const header = document.createElement('div');
                header.className = 'menu-section-header';
                header.innerHTML = `📁 ${result.menuLabel} <span style="font-size:0.7rem; color:#F9B53E;">(${result.cards.length} kartu)</span>`;
                menuSection.appendChild(header);
                
                const gridContainer = document.createElement('div');
                gridContainer.className = `games-grid grid-cols-${result.gridCols}`;
                menuSection.appendChild(gridContainer);
                
                searchResultsContainer.appendChild(menuSection);
                
                result.cards.forEach((card, idx) => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'game-card';
                    
                    const titleArea = document.createElement('div');
                    titleArea.className = 'card-title';
                    const titleInput = document.createElement('input');
                    titleInput.type = 'text';
                    titleInput.className = 'card-title-input';
                    titleInput.value = card.title || '';
                    titleInput.placeholder = 'Judul kartu (kosong)';
                    titleInput.addEventListener('input', (e) => {
                        const originalMenuData = menuDataMap[card.originalMenu];
                        if (originalMenuData && originalMenuData.cards) {
                            const originalCard = originalMenuData.cards.find(c => c.title === card.title && c.note === card.note);
                            if (originalCard) {
                                originalCard.title = e.target.value;
                                card.title = e.target.value;
                            }
                        }
                        saveAllData();
                        performGlobalSearch(currentSearchTerm);
                    });
                    titleArea.appendChild(titleInput);
                    
                    const noteArea = document.createElement('div');
                    noteArea.className = 'note-area';
                    const textarea = document.createElement('textarea');
                    textarea.className = 'note-textarea';
                    textarea.value = card.note || '';
                    textarea.placeholder = '✏️ Tulis catatan di sini...';
                    textarea.addEventListener('input', (e) => {
                        const originalMenuData = menuDataMap[card.originalMenu];
                        if (originalMenuData && originalMenuData.cards) {
                            const originalCard = originalMenuData.cards.find(c => c.title === card.title && c.note === card.note);
                            if (originalCard) {
                                originalCard.note = e.target.value;
                                card.note = e.target.value;
                            }
                        }
                        saveAllData();
                        performGlobalSearch(currentSearchTerm);
                    });
                    noteArea.appendChild(textarea);
                    
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-card-btn';
                    delBtn.innerText = '🗑 Hapus Kartu';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const originalMenuData = menuDataMap[card.originalMenu];
                        if (originalMenuData && originalMenuData.cards) {
                            const cardIndex = originalMenuData.cards.findIndex(c => c.title === card.title && c.note === card.note);
                            if (cardIndex !== -1) {
                                originalMenuData.cards.splice(cardIndex, 1);
                                saveAllData();
                                performGlobalSearch(currentSearchTerm);
                            }
                        }
                    });
                    
                    cardDiv.appendChild(titleArea);
                    cardDiv.appendChild(noteArea);
                    cardDiv.appendChild(delBtn);
                    gridContainer.appendChild(cardDiv);
                });
            }
            
            if (editMode) {
                document.querySelectorAll('#searchResultsContainer .card-title-input').forEach(input => {
                    input.style.borderColor = '#FFB347';
                    input.style.background = 'rgba(30, 30, 45, 0.9)';
                });
                document.querySelectorAll('#searchResultsContainer .note-textarea').forEach(ta => {
                    ta.style.borderColor = '#FFB347';
                    ta.style.background = 'rgba(30, 30, 45, 0.8)';
                });
                document.querySelectorAll('#searchResultsContainer .delete-card-btn').forEach(btn => {
                    btn.style.display = 'block';
                });
            }
        }

        // ==================== FILTER BAR ====================
        function renderFilterBar() {
            filterBar.innerHTML = '';
            filterMenuList.forEach(menu => {
                const chip = document.createElement('span');
                chip.className = 'filter-chip';
                if (menu.active) chip.classList.add('active');
                chip.setAttribute('data-filter', menu.value);
                chip.innerText = menu.label || 'Menu Baru';
                
                if (editMode) {
                    const delBtn = document.createElement('button');
                    delBtn.innerText = '✖';
                    delBtn.className = 'delete-chip';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (menu.value === 'all') return alert('Tidak bisa hapus menu Semua');
                        filterMenuList = filterMenuList.filter(m => m.value !== menu.value);
                        delete menuDataMap[menu.value];
                        if (activeMenuValue === menu.value) {
                            activeMenuValue = 'all';
                            filterMenuList.forEach(m => m.active = (m.value === 'all'));
                        }
                        renderFilterBar();
                        if (!isSearching) {
                            const menuData = getCurrentMenuData();
                            gridSelect.value = menuData.gridCols || '3';
                            renderCardsForMenu(gamesGrid, menuData.cards || []);
                        } else {
                            performGlobalSearch(currentSearchTerm);
                        }
                        saveAllData();
                    };
                    chip.appendChild(delBtn);
                    chip.style.cursor = 'text';
                    chip.contentEditable = 'true';
                    chip.addEventListener('blur', (e) => {
                        let newLabel = e.target.innerText.replace('✖', '').trim();
                        if (newLabel === '') newLabel = 'Menu Baru';
                        menu.label = newLabel;
                        renderFilterBar();
                        saveAllData();
                    });
                } else {
                    chip.style.cursor = 'pointer';
                    chip.contentEditable = 'false';
                }
                filterBar.appendChild(chip);
            });
            bindFilterEvents();
        }
        
        function bindFilterEvents() {
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.removeEventListener('click', chip.clickHandler);
                const handler = function() {
                    if (editMode) return;
                    const menuValue = this.getAttribute('data-filter');
                    if (menuValue !== activeMenuValue) {
                        activeMenuValue = menuValue;
                        filterMenuList.forEach(menu => {
                            menu.active = (menu.value === activeMenuValue);
                        });
                        renderFilterBar();
                        if (!isSearching) {
                            const menuData = getCurrentMenuData();
                            gridSelect.value = menuData.gridCols || '3';
                            renderCardsForMenu(gamesGrid, menuData.cards || []);
                        }
                        saveAllData();
                    }
                };
                chip.clickHandler = handler;
                chip.addEventListener('click', handler);
            });
        }
        
        function addNewFilterMenu() {
            const newValue = 'menu_' + Date.now();
            filterMenuList.push({ label: 'Menu Baru', value: newValue, active: false });
            menuDataMap[newValue] = JSON.parse(JSON.stringify({ cards: [], gridCols: '3' }));
            renderFilterBar();
            saveAllData();
        }
        
        function addNewCard() {
            if (isSearching) {
                alert('Silakan keluar dari mode pencarian (kosongkan kotak pencarian) untuk menambah kartu');
                return;
            }
            const menuData = getCurrentMenuData();
            
            if (!menuData.cards) menuData.cards = [];
            menuData.cards.push({
                title: '',
                note: ''
            });
            
            renderCardsForMenu(gamesGrid, menuData.cards);
            saveCurrentMenuData();
        }
        
        function toggleEditMode() {
            editMode = !editMode;
            if (editMode) {
                editModeBtn.classList.add('active');
                editModeBtn.innerHTML = '✏️ Mode Edit (AKTIF)';
                document.body.classList.add('edit-mode');
            } else {
                editModeBtn.classList.remove('active');
                editModeBtn.innerHTML = '✏️ Mode Edit (MATI)';
                document.body.classList.remove('edit-mode');
            }
            renderFilterBar();
            
            if (isSearching) {
                performGlobalSearch(currentSearchTerm);
            } else {
                const menuData = getCurrentMenuData();
                renderCardsForMenu(gamesGrid, menuData.cards || []);
            }
            saveAllData();
        }
        
        gridSelect.addEventListener('change', (e) => {
            if (!isSearching) {
                const menuData = getCurrentMenuData();
                menuData.gridCols = e.target.value;
                renderCardsForMenu(gamesGrid, menuData.cards || []);
                saveCurrentMenuData();
            }
        });
        
        searchInput.addEventListener('input', (e) => {
            performGlobalSearch(e.target.value);
        });
        
        function init() {
            loadAllData();
            const menuData = getCurrentMenuData();
            gridSelect.value = menuData.gridCols || '3';
            renderFilterBar();
            renderCardsForMenu(gamesGrid, menuData.cards || []);
            editModeBtn.addEventListener('click', toggleEditMode);
            addMenuBtn.addEventListener('click', addNewFilterMenu);
            addCardBtn.addEventListener('click', addNewCard);
        }
        
        init();
    </script>
</body>
</html>
